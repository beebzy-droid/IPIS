name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + unit tests (serving / conformal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lean deps
        # Serving runtime + test tooling only — NOT the full project deps
        # (torch/mlflow/etc.). MLflow is intentionally absent, so the MLflow
        # round-trip test skips (pytest.importorskip).
        # black/ruff are PINNED: their formatting/rules drift across versions, so
        # CI must match the version used locally to keep `--check` reproducible.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-serving.txt
          pip install pytest pytest-asyncio pytest-cov "ruff==0.15.16" "black==24.10.0" httpx
      - name: Ruff
        # Scope to the stable library + tests. scripts/ holds active WIP
        # (canonical-TEP) and is linted locally; re-add "scripts" here once it lands.
        run: ruff check src tests
      - name: Black
        run: black --check src tests
      - name: Unit tests
        # src layout: make `ipis` importable (root conftest imports
        # ipis.shared.state_bus, so this is needed even for the serving tests).
        env:
          PYTHONPATH: src
        # Data-free Module-1 suite; data-dependent tests run locally
        # (gitignored benchmark data is not in CI).
        run: >
          pytest --no-cov -q
          tests/unit/test_conformal.py
          tests/unit/test_service.py
          tests/unit/test_api.py
          tests/unit/test_loader.py
          tests/unit/test_dashboard.py

  docker:
    name: docker build + container smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ipis-softsensor:ci .
      - name: Run container
        run: docker run -d --name ss -p 8000:8000 ipis-softsensor:ci
      - name: Wait for health
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8000/health >/dev/null; then echo healthy; exit 0; fi
            sleep 2
          done
          echo "service did not become healthy" && exit 1
      - name: Smoke /health and /predict
        run: |
          curl -sf http://localhost:8000/health | grep -q '"status":"ok"'
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"instances":[[1,0,0]]}' | grep -q '"predictions"'
      - name: Container logs on failure
        if: failure()
        run: docker logs ss
