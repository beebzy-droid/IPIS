name: Docker Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.serving
          push: false
          tags: ipis-serving:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.dashboard
          push: false
          tags: ipis-dashboard:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
