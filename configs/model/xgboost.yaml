# XGBoost — gradient boosting baseline

name: xgboost
type: baseline
description: "XGBoost regression — nonlinear ML baseline"

hyperparameters:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: ${seed}
  n_jobs: -1
  early_stopping_rounds: 50

search_space:
  max_depth: [4, 6, 8, 10]
  learning_rate: [0.01, 0.03, 0.05, 0.1]
  n_estimators: [200, 500, 1000]
  subsample: [0.6, 0.8, 1.0]
